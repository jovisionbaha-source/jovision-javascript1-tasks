<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4</title>
</head>
<body>

<button id="btn">Click me</button>

<script>
    document.getElementById("btn").addEventListener("click", function () {


        let arr = [];
        for (let i = 0; i <= 100; i++) {
            arr.push(i);
        }


        let sum = 0;
        for (let i = 0; i < arr.length; i++) {
            sum += arr[i];
        }


        console.log("Sum =", sum);
    });
</script>

</body>
</html>
