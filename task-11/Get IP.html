<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 11</title>
</head>
<body>

<button id="btn">Get IP</button>

<script>
    document.getElementById("btn").addEventListener("click", function () {

        fetch("https://api.ipify.org/?format=text")
            .then(response => {
                if (!response.ok) {
                    throw new Error("Network response was not OK");
                }
                return response.text();
            })
            .then(ip => {
                document.getElementById("btn").textContent = ip;
            })
            .catch(error => {
                alert("Error: " + error.message);
            });

    });
</script>

</body>
</html>
