<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 5</title>
</head>
<body>

<button id="btn">Click me</button>

<script>
    document.getElementById("btn").addEventListener("click", function () {


        let arr = [];
        for (let i = 0; i <= 100; i++) {
            arr.push(i);
        }


        let sum = 0;

        for (let i = 0; i < arr.length; i++) {
            if (arr[i] % 2 === 0) {
                sum += arr[i];
            }
        }

        console.log("Sum of even numbers =", sum);
    });
</script>

</body>
</html>
